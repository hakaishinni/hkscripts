<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta content="width=device-width, initial-scale=1" name="viewport">
<title>HK SCRIPTS - Visual Novels</title>

<!-- Fontes e Ícones -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

<style>
/* ===================================================================== */
/* CSS PRINCIPAL DA PÁGINA INICIAL (VITRINE)                             */
/* ===================================================================== */
:root {
  --bg-dark: #0f0f13;
  --bg-card: #18181f;
  --text-main: #e2e2e2;
  --text-dim: #999;
  --accent: #00e676; /* Verde HK Scripts */
  --accent-hover: #00c853;
  --nav-bg: rgba(15, 15, 19, 0.95);
}

body {
  margin: 0; padding: 0;
  background-color: var(--bg-dark); color: var(--text-main);
  font-family: 'Inter', sans-serif; line-height: 1.6;
}
h1, h2, h3, h4, h5, h6 { font-family: 'Poppins', sans-serif; }
a { text-decoration: none; }

/* Header e Navegação */
.header-site {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 20px 5%; background: var(--nav-bg);
  position: sticky; top: 0; z-index: 1000;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
}
.header-top { display: flex; width: 100%; justify-content: space-between; align-items: center; margin-bottom: 15px;}
.menu-toggle { cursor: pointer; font-size: 24px; color: var(--accent); }
.header-logo { text-align: center; flex: 1; }
.header-logo h1 { margin: 0; font-size: 28px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase;}
.search-container {
  display: flex; align-items: center; background: #111; border: 1px solid #333;
  border-radius: 20px; padding: 8px 15px; width: 100%; max-width: 400px;
}
.search-container input {
  background: transparent; border: none; color: #fff; width: 100%; outline: none; font-size: 14px;
}
.search-container i { color: var(--accent); cursor: pointer; }

/* Banner Principal (Destaque) */
.featured-banner {
  max-width: 1000px; margin: 30px auto; padding: 0 20px;
}
.banner-content {
  position: relative; border-radius: 12px; overflow: hidden;
  background-color: var(--bg-card);
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  display: flex; align-items: flex-end;
  min-height: 300px;
  /* Imagem de Fundo do Banner apontando para o Serenity */
  background-image: url('https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgTe-5IuVoh0lM1vwTPqAPAAFcOF7288E55nuKWwAcFtUfp8E7ncmb9-E9IPYScz77d2d8jedDX51N5LaA25CSKV-ePZue0RqEiS5YLyOu6hFVJGdz0Evr1ca-mKjyVTvJ2UrrSQ6eMl5iM29aVFCAXkO4KkUbjRj7Y5HZR9_bJuRYrcYxbBM0t0nKyzIA/s1920/1001199637.png');
  background-size: cover; background-position: center;
}
.banner-overlay {
  background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
  width: 100%; padding: 40px 20px 20px 20px;
  display: flex; justify-content: space-between; align-items: center;
}
.banner-info h2 { margin: 0 0 15px 0; color: var(--accent); font-size: 28px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
.btn-play {
  background: var(--accent); color: #000; padding: 10px 25px; border-radius: 6px;
  font-weight: bold; font-family: 'Poppins', sans-serif; display: inline-block;
  transition: background 0.3s;
}
.btn-play:hover { background: var(--accent-hover); }
.banner-nav { color: var(--accent); font-size: 24px; cursor: pointer; background: rgba(0,0,0,0.5); border-radius: 50%; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;}

/* Grid de Jogos (Cards) */
.main-container { max-width: 1000px; margin: 0 auto 40px auto; padding: 0 20px; }
.post-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px;
}
.post-card {
  background: var(--bg-card); border-radius: 12px; overflow: hidden;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.3s; border: 1px solid #222;
}
.post-card:hover { transform: translateY(-5px); border-color: var(--accent); }
.post-card img { width: 100%; height: 160px; object-fit: cover; display: block; border-bottom: 1px solid #333;}
.card-content { padding: 15px; }
.card-title { margin: 0 0 10px 0; color: #fff; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { display: flex; gap: 15px; font-size: 12px; color: var(--text-dim); }
.card-meta span { display: flex; align-items: center; gap: 5px; }

/* Rodapé */
.site-footer {
  background: #111; padding: 40px 20px; margin-top: 50px; border-top: 1px solid #222;
}
.footer-content { max-width: 1000px; margin: 0 auto; display: flex; flex-wrap: wrap; gap: 40px; justify-content: space-between; }
.footer-col h4 { color: var(--accent); margin-bottom: 15px; font-size: 18px; }
.footer-col p { color: var(--text-dim); font-size: 14px; max-width: 300px; }
.footer-links a { display: flex; align-items: center; gap: 10px; color: var(--text-main); margin-bottom: 10px; font-size: 14px; transition: color 0.3s; }
.footer-links a:hover { color: var(--accent); }
.copyright { text-align: center; color: #666; font-size: 12px; margin-top: 40px; border-top: 1px solid #222; padding-top: 20px; }

@media(max-width: 768px) {
  .banner-overlay { flex-direction: column; align-items: flex-start; gap: 20px; }
  .banner-nav { display: none; }
}
</style>
</head>
