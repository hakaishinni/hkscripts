<script type="text/javascript">
/* ALERTA DE ADMIN */
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('admin') === 'hk') {
  localStorage.setItem('hk_admin', 'true');
  alert('Bem-vindo, chefe!');
}

/* SCRIPT DO PIX */
function copyPix() { 
  var copyText = document.getElementById("pixKey"); 
  if(copyText){
      copyText.select(); 
      copyText.setSelectionRange(0, 99999); 
      navigator.clipboard.writeText(copyText.value).then(function() { 
        alert("Chave PIX copiada! 💚"); 
      }); 
  }
}

window.onscroll = function() { var btn = document.getElementById("backToTop"); if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) { btn.style.display = "flex"; } else { btn.style.display = "none"; } };

/* SCRIPT DO SLIDER ORIGINAL */
let currentSlide = 0;
function updateSlider(){ const track = document.getElementById('slideTrack'); if(track) track.style.transform = `translateX(-${currentSlide * 100}%)`; }
function nextSlide(){ const slides = document.querySelectorAll('.slide-item'); if(slides.length > 0) { currentSlide = (currentSlide + 1) % slides.length; updateSlider(); } }
function prevSlide(){ const slides = document.querySelectorAll('.slide-item'); if(slides.length > 0) { currentSlide = (currentSlide - 1 + slides.length) % slides.length; updateSlider(); } }

document.addEventListener("DOMContentLoaded", function() {
  const posts = document.querySelectorAll('.post-data-link');
  const track = document.getElementById('slideTrack');
  if(posts.length > 0 && track) {
    posts.forEach((post, index) => { if(index < 5) {
      let img = post.getAttribute('data-img') || 'https://via.placeholder.com/1200x400';
      let title = post.getAttribute('data-title');
      let url = post.getAttribute('href');
      track.innerHTML += `<div class="slide-item"><img alt="${title}" class="slide-img" src="${img}"/><div class="slide-content"><h2 class="slide-title">${title}</h2><a class="slide-btn" href="${url}">Ver Script</a></div></div>`;
    }});
    setInterval(nextSlide, 5000);
  }
  
  /* SCRIPT DOS LINKS DE DOWNLOAD AUTOMÁTICOS */
  const pb = document.querySelector('.post-body');
  if (pb) { pb.querySelectorAll('a').forEach(link => {
    const url = link.href.toLowerCase();
    let bc = ''; let bt = ''; let ic = 'fa-download';
    
    if (url.includes('vexfile.com')) { bc = 'btn-vexfile'; bt = ''; ic = ''; }
    else if (url.includes('boostylink.com')) { bc = 'btn-boosty'; bt = ''; ic = ''; }
    else if (url.includes('mediafire.com')) { bc = 'btn-mediafire'; bt = 'Baixar via MediaFire'; }
    else if (url.includes('mega.nz')) { bc = 'btn-mega'; bt = 'Baixar via MEGA'; }
    else if (url.includes('drive.google.com')) { bc = 'btn-drive'; bt = 'Baixar via Drive'; }
    
    if (bc !== '') { 
      link.className = 'dl-btn ' + bc; 
      link.innerHTML = ic !== '' ? `<i aria-hidden="true" class="fa ${ic}"></i> ${bt}` : bt; 
      const w = document.createElement('div'); w.className = 'download-area'; 
      link.parentNode.insertBefore(w, link); w.appendChild(link); 
    }
  });}

  /* SCRIPT DA GALERIA EM GRID (INDESTRUTÍVEL) */
  const postBodyGaleria = document.querySelector('.item .post-body');
  if (postBodyGaleria) {
    const imgs = postBodyGaleria.querySelectorAll('img');
    if (imgs.length > 0) {
      imgs[0].classList.add('img-capa');
      if (imgs.length > 1) {
        const galleryWrapper = document.createElement('div');
        galleryWrapper.className = 'hk-grid';
        let firstGalItem = imgs[1].closest('.separator') || imgs[1].closest('a') || imgs[1];
        firstGalItem.parentNode.insertBefore(galleryWrapper, firstGalItem);
        for (let i = 1; i < imgs.length; i++) {
          let item = imgs[i].closest('.separator') || imgs[i].closest('a') || imgs[i];
          galleryWrapper.appendChild(item);
          imgs[i].classList.add('img-galeria');
        }
      }
    }
  }

  /* SCRIPT PARA CORRIGIR O VÃO GIGANTE */
  const pbClean = document.querySelector('.item .post-body');
  if (pbClean) {
    pbClean.querySelectorAll('div, p, span').forEach(el => {
      let conteudo = el.innerHTML.replace(/&nbsp;/g, '').trim();
      if (conteudo === '' || conteudo === '<br>') { el.remove(); }
    });
    pbClean.querySelectorAll('br').forEach(br => {
      let prox = br.nextElementSibling;
      if (prox && prox.tagName === 'BR') { br.remove(); }
    });
  }
});
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDCNF3pZ3g20UkNDTUYq-X9zkyKA3El1TM",
    authDomain: "hk-scripts-db.firebaseapp.com",
    databaseURL: "https://hk-scripts-db-default-rtdb.firebaseio.com",
    projectId: "hk-scripts-db",
    storageBucket: "hk-scripts-db.firebasestorage.app",
    messagingSenderId: "688262885548",
    appId: "1:688262885548:web:495109ee40f2f603a6af09",
    measurementId: "G-X0QLGZMQQT"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  function sanitizePath(path) { return path.replace(/[.\/#$\[\]]/g, "_"); }
  const currentPath = window.location.pathname;
  const pathId = sanitizePath(currentPath);

  if (currentPath !== "/" && currentPath !== "" && !currentPath.includes("/search")) {
    if (localStorage.getItem('hk_admin') !== 'true') { 
      runTransaction(ref(database, 'views/' + pathId), (v) => (v || 0) + 1); 
    }
  }

  onValue(ref(database, 'views'), (s) => {
    const d = s.val() || {};
    document.querySelectorAll('.view-count').forEach(el => {
      const card = el.closest('.post-outer');
      const linkEl = card ? card.querySelector('.post-data-link') : null;
      const path = linkEl ? sanitizePath(new URL(linkEl.getAttribute('href'), window.location.origin).pathname) : pathId;
      el.innerText = d[path] || 0;
    });
  });

  function updateRatingsUI(id, el, isCard = false) {
    onValue(ref(database, 'ratings/' + id), (s) => {
      const data = s.val() || { totalPoints: 0, count: 0 };
      const avg = data.count > 0 ? (data.totalPoints / data.count).toFixed(1) : "0.0";
      if (isCard) { 
        el.innerHTML = `<i aria-hidden="true" class="fa fa-star" style="color:var(--star-color)"></i> ${avg} <span style="color:#888; font-size:11px;">(${data.count})</span>`; 
      } else { 
        const display = document.getElementById('currentRatingDisplay');
        if (display) {
          display.innerHTML = `<span style="color:var(--accent); font-weight:bold;">Média: ${avg} / 5</span> baseado em ${data.count} avaliações.`; 
        }
      }
    });
  }

  document.querySelectorAll('.grid-stars').forEach(container => {
    const url = container.getAttribute('data-posturl');
    if(url) { updateRatingsUI(sanitizePath(new URL(url, window.location.origin).pathname), container, true); }
  });

  if (document.getElementById('currentRatingDisplay')) { updateRatingsUI(pathId, null, false); }

  document.querySelectorAll('input[name="rating"]').forEach(star => {
    star.addEventListener('change', function() {
      const points = parseInt(this.value);
      const msg = document.getElementById('ratingMsg');
      msg.style.display = "block"; 
      msg.innerText = "Salvando voto...";
      
      runTransaction(ref(database, 'ratings/' + pathId), (current) => {
        if (!current) current = { totalPoints: 0, count: 0 };
        current.totalPoints += points; 
        current.count += 1;
        return current;
      }).then(() => { 
        msg.innerText = "Avaliação enviada com sucesso! ⭐"; 
        document.querySelectorAll('input[name="rating"]').forEach(s => s.disabled = true); 
      });
    });
  });
</script>
</body>
