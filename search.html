<style>
/* CSS GLOBAL */
:root{--bg-body:#0a0a0a;--bg-card:#141414;--text-main:#e0e0e0;--text-dim:#888;--accent:#00ff7f;--border:#222;--star-color:#ffcc00}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-track{background:var(--bg-body)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}::-webkit-scrollbar-thumb:hover{background:var(--accent)}
body{background-color:var(--bg-body);color:var(--text-main);font-family:'Inter',sans-serif;margin:0;display:flex;flex-direction:column;min-height:100vh}
a,a:visited{text-decoration:none;color:inherit}h1,h2,h3,h4{font-family:'Poppins',sans-serif}

/* Header */
.header-site{display:flex;justify-content:space-between;align-items:center;padding:20px 40px;background:var(--bg-card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:1000}
.nav-left{display:flex;align-items:center;gap:15px}
.menu-toggle{font-size:24px;color:var(--accent);cursor:pointer}
.header-logo-search{display:flex;align-items:center;gap:20px}
.header-logo-search h1{color:var(--accent);margin:0;font-size:28px;letter-spacing:2px;text-transform:uppercase;text-shadow:0 0 15px rgba(0,255,127,0.3)}
.search-box{display:flex;align-items:center;background:#0a0a0a;border:1px solid var(--border);border-radius:4px;padding:5px 10px;transition:.3s}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 10px rgba(0,255,127,0.2)}
.search-input{background:transparent;border:none;color:#fff;padding:5px;outline:none;font-size:14px;width:150px}
.search-btn{background:transparent;border:none;color:var(--accent);cursor:pointer}

/* Header de Pesquisa */
.search-header { max-width: 1200px; margin: 40px auto 20px auto; padding: 0 20px; width: 100%; box-sizing: border-box; text-align: left; border-bottom: 1px solid var(--border); padding-bottom: 15px;}
.search-header h2 { font-size: 22px; color: #fff; font-weight: normal; margin: 0; }
.search-header span { color: var(--accent); font-weight: bold; }
.empty-state { text-align: center; color: var(--text-dim); margin-top: 50px; font-size: 18px; padding: 0 20px; width: 100%;}

/* Grid de Cards */
.main-container { max-width: 1200px; margin: 0 auto 40px auto; padding: 0 20px; width: 100%; box-sizing: border-box; flex: 1; }
.post-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
.card { background: var(--bg-card); border-radius: 10px; overflow: hidden; border: 1px solid var(--border); transition: 0.3s; display: flex; flex-direction: column; }
.card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
.card-img { width: 100%; height: 180px; object-fit: cover; display: block; border-bottom: 1px solid var(--border); }
.card-info { padding: 15px; }
.card-title { font-size: 16px; margin: 0 0 10px 0; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { display: flex; gap: 15px; font-size: 13px; color: var(--text-dim); align-items: center; }
.card-meta span { display: flex; align-items: center; gap: 5px; }
.meta-star { color: var(--star-color); }
.meta-eye { color: var(--accent); }

/* Footer */
.rich-footer{background:var(--bg-card);border-top:1px solid var(--border);padding:40px 20px;margin-top:50px}
.footer-content{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;text-align:left}
.footer-col h4{color:var(--accent);margin-top:0}.footer-col ul{list-style:none;padding:0}.footer-col ul li{margin-bottom:10px}
.footer-col ul li a{color:var(--text-main);text-decoration:none;transition:.3s}.footer-col ul li a:hover{color:var(--accent);padding-left:5px}
.footer-bottom{text-align:center;padding-top:20px;margin-top:20px;border-top:1px solid var(--border);font-size:13px;color:var(--text-dim)}

/* Ajustes Mobile */
@media(max-width:768px){
  .header-site{flex-direction:column;gap:15px; padding: 15px;}
  .header-logo-search{flex-direction:column; width: 100%; gap: 15px;}
  .search-box{width: 100%; justify-content: space-between; box-sizing: border-box;}
  .search-input{width: 100%;}
  .nav-left { width: 100%; justify-content: center; position: relative;}
  .menu-toggle { position: absolute; left: 0; }
  
  .search-header h2 { font-size: 18px; text-align: center; }
  .main-container { padding: 0 10px; }
  .post-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .card-img { height: 110px; } 
  .card-info { padding: 10px; }
  .card-title { font-size: 13px; margin-bottom: 5px; } 
  .card-meta { font-size: 10px; gap: 8px; flex-wrap: wrap; }
}
</style>

  // Escreve na tela exatamente o que ele digitou
  document.getElementById('query-text').innerText = queryRaw;

  // Lógica de filtragem à prova de falhas (compara tudo em minúsculo)
  const resultsContainer = document.getElementById('search-results-container');
  const filteredGames = gamesDB.filter(game => game.title.toLowerCase().includes(query));

  // Injetar o HTML dos resultados
  if (filteredGames.length === 0 || query === '') {
    resultsContainer.innerHTML = `<div class="empty-state" style="grid-column: 1 / -1;"><i class="fa fa-folder-open" style="font-size: 40px; margin-bottom: 15px; display:block;"></i> Poxa, não encontramos nada para "${queryRaw}".</div>`;
  } else {
    filteredGames.forEach(game => {
      const cardHTML = `
        <a href="${game.url}" class="card">

          <div class="card-info">

          </div>
        </a>
      `;
      resultsContainer.innerHTML += cardHTML;
    });

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDCNF3pZ3g20UkNDTUYq-X9zkyKA3El1TM",
    authDomain: "hk-scripts-db.firebaseapp.com",
    databaseURL: "https://hk-scripts-db-default-rtdb.firebaseio.com",
    projectId: "hk-scripts-db"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // PUXAR VIEWS
  document.querySelectorAll('.fb-views').forEach(el => {
    const path = el.getAttribute('data-path');
    if(path) {
      onValue(ref(database, 'views/' + path), (snapshot) => {
        el.innerText = snapshot.val() || 0;
      });
    }
  });

  // PUXAR ESTRELAS
  document.querySelectorAll('.fb-rating').forEach(el => {
    const path = el.getAttribute('data-path');
    if(path) {
      onValue(ref(database, 'ratings/' + path), (snapshot) => {
        const data = snapshot.val() || { totalPoints: 0, count: 0 };
        const avg = data.count > 0 ? (data.totalPoints / data.count).toFixed(1) : "0.0";
        el.innerHTML = `<i aria-hidden="true" class="fa fa-star meta-star"></i> ${avg} <span style="font-size:9px">(${data.count})</span>`;
      });
    }
  });
</script>
